name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Source/AutoActions.sln

      # Pre-build event copies HDRController.dll từ Externals\$(PlatformName)\
      # nhưng repo chỉ có 1 bản chung, nên tạo thư mục x64/x86 thủ công
      - name: Prepare HDRController for x64 and x86
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Source\Externals\x64"
          New-Item -ItemType Directory -Force -Path "Source\Externals\x86"
          Copy-Item "Source\AutoActions\HDRController.dll" "Source\Externals\x64\HDRController.dll"
          Copy-Item "Source\AutoActions\HDRController.dll" "Source\Externals\x86\HDRController.dll"

      - name: Build x64 Release
        run: |
          msbuild Source/AutoActions.sln `
            /t:Build `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64

      - name: Build x86 Release
        run: |
          msbuild Source/AutoActions.sln `
            /t:Build `
            /m `
            /p:Configuration=Release `
            /p:Platform=x86

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoActions-x64
          path: Source/Release_x64/
          if-no-files-found: error

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoActions-x86
          path: Source/Release_x86/
          if-no-files-found: error
