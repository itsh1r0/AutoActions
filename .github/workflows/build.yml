name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Source/AutoActions.sln

      - name: Build HDRController (C++)
        shell: pwsh
        run: |
          msbuild Source/HDRController/HDRController.sln /t:Build /m /p:Configuration=Release /p:Platform=x64
          msbuild Source/HDRController/HDRController.sln /t:Build /m /p:Configuration=Release /p:Platform=x86

      - name: Prepare HDRController DLL for x64/x86
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Source\Externals\x64"
          New-Item -ItemType Directory -Force -Path "Source\Externals\x86"
          # Dùng bản vừa build thay vì file có sẵn trong repo
          Copy-Item "Source\HDRController\x64\Release\HDRController.dll" "Source\Externals\x64\HDRController.dll" -Force
          Copy-Item "Source\HDRController\Win32\Release\HDRController.dll" "Source\Externals\x86\HDRController.dll" -Force

      - name: Build & Package
        shell: pwsh
        run: |
          # Patch Build.ps1: thay hardcoded VS path bằng msbuild từ PATH
          # (setup-msbuild ở trên đã add vào PATH rồi)
          $msbuildPath = (Get-Command msbuild).Source
          $content = Get-Content Build.ps1 -Raw
          $content = $content -replace [regex]::Escape("'C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\msbuild.exe'"), "'$msbuildPath'"

          # Fix typo $x86ip -> $x86zip
          $content = $content -replace '\$x86ip', '$x86zip'

          Set-Content Build.ps1 $content
          New-Item -ItemType Directory -Force -Path Releases
          . .\Build.ps1

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoActions-x64
          path: Releases/*x64*.zip
          if-no-files-found: error

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoActions-x86
          path: Releases/*x86*.zip
          if-no-files-found: error
